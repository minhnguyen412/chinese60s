<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom — Chinese60s</title>
  <meta name="description" content="Interactive classroom for learning Chinese with video, notes, vocabulary, speaking, and sentence search.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
  <style>
    :root {
      --black: #222;
      --green: #7cb83e;
      --green-dark: #5a8f27;
      --green-light: #d8f0a0;
      --green-pale: #f2fde0;
      --yellow: #ffd84d;
      --yellow-pale: #fffbe6;
      --peach: #ffb89a;
      --peach-pale: #fff3ee;
      --sky: #72c8f0;
      --sky-pale: #eaf8ff;
      --lavender: #c5b0f8;
      --lavender-pale: #f3f0ff;
      --pink: #ffadc5;
      --pink-pale: #fff2f6;
      --white: #ffffff;
      --bg: #fffef5;
      --shadow-sm: 3px 3px 0 var(--black);
      --shadow-md: 4px 4px 0 var(--black);
      --shadow-lg: 6px 6px 0 var(--black);
      --border: 2.5px solid var(--black);
      --border-thick: 3px solid var(--black);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Fredoka', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--black);
      overflow: hidden;
      height: 100dvh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,0,0,0.045) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── NOTIFICATION TOAST ── */
    .notification-toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      max-width: 350px;
      background: white;
      border: var(--border-thick);
      border-radius: 16px;
      padding: 16px 20px;
      box-shadow: var(--shadow-lg);
      font-size: 0.95rem;
      z-index: 500;
      animation: slideInUp 0.3s ease;
    }

    .notification-toast.success {
      border-color: var(--green);
      background: var(--green-pale);
    }

    .notification-toast.info {
      border-color: var(--sky);
      background: var(--sky-pale);
    }

    .notification-toast.warning {
      border-color: #ff9800;
      background: #fff3e0;
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── HEADER ── */
    header {
      background: var(--green);
      border-bottom: var(--border-thick);
      padding: 0 24px;
      height: 66px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    header h1 {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: 1.5rem;
      color: white;
      letter-spacing: 0.04em;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-badge {
      background: rgba(255,255,255,0.3);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      border: 2px solid white;
    }

    /* ── MAIN LAYOUT ── */
    .classroom-container {
      display: flex;
      height: calc(100dvh - 66px);
      gap: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 500px;
      height: 100%;
      background: var(--white);
      border-right: var(--border-thick);
      display: flex;
      flex-direction: column;
      z-index: 100;
      position: relative;
      flex-shrink: 0;
      will-change: width;
      overflow-y: auto;
      overflow-x: hidden;
      transition: width 0.1s ease;
    }

    .sidebar-resize-handle {
      position: absolute;
      width: 10px;
      height: 100%;
      right: -5px;
      top: 0;
      cursor: ew-resize;
      z-index: 150;
      background: transparent;
      will-change: background;
      pointer-events: auto;
      touch-action: none;
      transition: background 0.2s ease;
    }

    .sidebar-resize-handle:hover,
    .sidebar-resize-handle.active {
      background: var(--green);
      box-shadow: -4px 0 8px rgba(0, 0, 0, 0.15);
    }

    /* Sidebar scrollbar */
    .sidebar::-webkit-scrollbar {
      width: 8px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--green);
      border-radius: 4px;
    }

    .sidebar::-webkit-scrollbar-thumb:hover {
      background: var(--green-dark);
    }

    /* ── MAIN CONTENT ── */
    .main-content {
      flex: 1;
      min-width: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    .content-scroller {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 28px 32px;
      min-height: 0;
    }

    /* ── VIDEO SECTION ── */
    .video-section {
      margin-bottom: 32px;
    }

    .video-frame {
      width: 100%;
      aspect-ratio: 16/9;
      border: var(--border-thick);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      background: var(--black);
    }

    .video-frame iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: none;
    }

    .video-title {
      margin-top: 16px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--black);
    }

    .video-meta {
      margin-top: 8px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      color: #666;
    }

    /* ── TWO COLUMN LAYOUT ── */
    .two-column-section {
      display: grid;
      grid-template-columns: 0.6fr 1.4fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    .section-card {
      background: var(--white);
      border: var(--border-thick);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .section-card-title {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: var(--border);
    }

    .notes-area {
      flex: 1;
      resize: none;
      font-family: 'Fredoka', sans-serif;
      font-weight: 400;
      font-size: 0.95rem;
      padding: 12px;
      border: var(--border);
      border-radius: 12px;
      background: var(--yellow-pale);
      color: var(--black);
      line-height: 1.6;
    }

    .notes-area::placeholder {
      color: rgba(0,0,0,0.4);
    }

    .notes-area:focus {
      outline: none;
      box-shadow: inset 0 0 0 3px var(--yellow);
    }

    .embed-frame {
      width: 100%;
      flex: 1;
      min-height: 200px;
      border: var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .embed-frame iframe {
      width: 100%;
      flex: 1;
      min-height: 200px;
      border: none;
      display: block;
    }

    /* ── FULL WIDTH SECTIONS ── */
    .full-width-section {
      margin-bottom: 32px;
      height: 65vh;
      position: relative;
    }

    .section-heading {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 14px;
      padding: 12px 16px;
      background: var(--green-pale);
      border: var(--border);
      border-radius: 14px;
    }

    .embed-container {
      width: 100%;
      height: 60vh;
      border: var(--border-thick);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      background: var(--white);
      position: relative;
    }

    .embed-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── EMBED RESIZE HANDLE ── */
    .embed-resize-handle {
      position: absolute;
      width: 100%;
      height: 8px;
      bottom: -4px;
      left: 0;
      cursor: ns-resize;
      background: transparent;
      pointer-events: auto;
      z-index: 150;
      transition: background 0.2s ease;
      touch-action: none;
    }

    .embed-resize-handle:hover,
    .embed-resize-handle.active {
      background: var(--green);
      box-shadow: 0 -4px 8px rgba(0, 0, 0, 0.15);
    }

    /* ── SCROLLBAR STYLING ── */
    .content-scroller::-webkit-scrollbar {
      width: 10px;
    }

    .content-scroller::-webkit-scrollbar-track {
      background: transparent;
    }

    .content-scroller::-webkit-scrollbar-thumb {
      background: var(--green);
      border-radius: 5px;
      border: 2px solid var(--bg);
    }

    .content-scroller::-webkit-scrollbar-thumb:hover {
      background: var(--green-dark);
    }

    /* ── CARD RESIZE HANDLES ── */
    .card-resize-handle {
      position: absolute;
      width: 100%;
      height: 6px;
      bottom: -3px;
      left: 0;
      cursor: ns-resize;
      background: transparent;
      pointer-events: auto;
      z-index: 150;
      transition: background 0.2s ease;
      touch-action: none;
    }

    .card-resize-handle:hover,
    .card-resize-handle.active {
      background: var(--green);
      box-shadow: 0 -2px 6px rgba(0, 0, 0, 0.12);
    }

    .card-resize-handle-right {
      position: absolute;
      width: 6px;
      height: 100%;
      right: -3px;
      top: 0;
      cursor: ew-resize;
      background: transparent;
      pointer-events: auto;
      z-index: 150;
      transition: background 0.2s ease;
      touch-action: none;
    }

    .card-resize-handle-right:hover,
    .card-resize-handle-right.active {
      background: var(--green);
      box-shadow: -2px 0 6px rgba(0, 0, 0, 0.12);
    }

    .card-resize-handle-left {
      position: absolute;
      width: 6px;
      height: 100%;
      left: -3px;
      top: 0;
      cursor: ew-resize;
      background: transparent;
      pointer-events: auto;
      z-index: 150;
      transition: background 0.2s ease;
      touch-action: none;
    }

    .card-resize-handle-left:hover,
    .card-resize-handle-left.active {
      background: var(--green);
      box-shadow: 2px 0 6px rgba(0, 0, 0, 0.12);
    }

    .canvas-toolbar {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .canvas-btn {
      padding: 8px 12px;
      background: #7cb83e;
      color: white;
      border: 2px solid #222;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .canvas-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .canvas-btn.active {
      background: #5a8f27;
      box-shadow: inset 0 0 0 2px #fff;
    }

    .canvas-btn.erase {
      background: #ff6b6b;
    }

    .canvas-btn.erase.active {
      background: #d63031;
    }

    /* ── ANIMATIONS ── */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .video-section,
    .two-column-section,
    .full-width-section {
      animation: slideIn 0.4s ease both;
    }

    .section-card {
      animation: slideIn 0.4s ease both;
    }

    .section-card:nth-child(2) {
      animation-delay: 0.1s;
    }

    .full-width-section:nth-of-type(2) {
      animation-delay: 0.2s;
    }

    .full-width-section:nth-of-type(3) {
      animation-delay: 0.3s;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) {
      .sidebar {
        width: 300px;
      }

      .content-scroller {
        padding: 20px 24px;
      }

      .two-column-section {
        gap: 16px;
      }

      .embed-container iframe {
        height: 500px;
      }
    }

    @media (max-width: 900px) {
      .classroom-container {
        flex-direction: column;
        height: auto;
        min-height: calc(100dvh - 66px);
      }

      .sidebar {
        width: 100%;
        height: 200px;
        border-right: none;
        border-bottom: var(--border-thick);
        flex-shrink: 0;
      }

      .main-content {
        flex: 1;
        height: auto;
        min-height: calc(100dvh - 66px - 200px);
      }

      .lesson-index {
        display: flex;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 8px 12px;
      }

      .lesson-item {
        margin: 6px 6px;
        flex-shrink: 0;
        min-width: 140px;
      }

      .two-column-section {
        grid-template-columns: 1fr;
      }

      .two-column-section .section-card {
        height: auto;
        min-height: 250px;
      }

      .embed-frame {
        min-height: 250px;
      }

      .content-scroller {
        padding: 16px 20px;
      }

      .embed-container {
        height: 50vh;
        min-height: 350px;
      }

      .full-width-section {
        height: 55vh;
        min-height: 400px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>CHINESE 60s</h1>
    <div class="header-right">
      <span class="user-badge" id="user-badge">Loading...</span>
    </div>
  </header>

  <div class="classroom-container">
    <!-- SIDEBAR - Learning Page Index Embed -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-content" style="height: 100%; border: none;">
        <iframe src="learning-page.html" style="width: 100%; height: 100%; border: none; display: block;"></iframe>
      </div>
      <div class="sidebar-resize-handle"></div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="content-scroller">

        <!-- VIDEO SECTION - YouTube Page Embed -->
        <section class="video-section" data-section="video" style="position: relative;">
          <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(124,184,62,0.1); border-radius: 8px 8px 0 0; margin: -20px -20px 12px -20px;">
            <span style="font-size: 0.85rem; color: #666;">Video</span>
          </div>
          <div class="video-frame" style="background: white; display: flex; align-items: center; justify-content: center; position: relative;">
            <canvas id="whiteboard" style="border: 2px solid #222; cursor: crosshair; display: block;"></canvas>
            <div class="canvas-toolbar">
              <button class="canvas-btn draw-btn active" title="Draw mode">✏️ Draw</button>
              <button class="canvas-btn erase-btn erase" title="Erase mode">🧹 Erase</button>
              <button class="canvas-btn clear-btn" title="Clear all">🗑️ Clear</button>
            </div>
          </div>
        </section>

        <!-- TWO COLUMN SECTION: NOTES + WORD CANVAS -->
        <section class="two-column-section" data-section="two-column">
          <!-- NOTES AREA -->
          <div class="section-card" style="background: var(--yellow-pale); border: var(--border-thick); position: relative;" data-card="notes">
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,216,77,0.3); margin: -20px -20px 12px -20px; border-radius: 8px 8px 0 0;">
              <span style="font-size: 0.85rem; color: #666;">Notes</span>
            </div>
            <div class="section-card-title" style="border-bottom: var(--border-thick);">📝 My Notes</div>
            <textarea class="notes-area" id="notes-area" placeholder="Write your notes here...
          
Key points:
• 你好 (nǐ hǎo) = Hello
• 我叫... (wǒ jiào...) = My name is...

Add your own notes and they'll be saved!"></textarea>
            <div class="card-resize-handle"></div>
            <div class="card-resize-handle-right"></div>
          </div>

          <!-- WORD CANVAS EMBED -->
          <div class="section-card" style="background: var(--sky-pale); border: var(--border-thick); position: relative;" data-card="word-canvas">
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(114,200,240,0.2); margin: -20px -20px 12px -20px; border-radius: 8px 8px 0 0;">
              <span style="font-size: 0.85rem; color: #0066cc;">Word Canvas</span>
            </div>
            <div class="section-card-title" style="border-bottom: var(--border-thick); color: #0066cc;">✏️ Word Canvas</div>
            <div class="embed-frame">
              <iframe id="word-canvas-frame" src="word-canvas.html"></iframe>
            </div>
            <div class="card-resize-handle"></div>
            <div class="card-resize-handle-left"></div>
          </div>
        </section>

        <!-- FIND SENTENCES SECTION -->
        <section class="full-width-section" data-section="find-sentences" style="position: relative;">
          <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(124,184,62,0.1); border-radius: 8px 8px 0 0; margin: -12px -16px 12px -16px;">
            <span style="font-size: 0.85rem; color: #666;">Find Sentences</span>
          </div>
          <div class="embed-container">
            <iframe id="find-sentences-frame" src="find-sentences.html"></iframe>
            <div class="embed-resize-handle"></div>
          </div>
        </section>

        <!-- SPEAKING PRACTICE SECTION -->
        <section class="full-width-section" data-section="speaking" style="position: relative;">
          <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(124,184,62,0.1); border-radius: 8px 8px 0 0; margin: -12px -16px 12px -16px;">
            <span style="font-size: 0.85rem; color: #666;">Speaking Practice</span>
          </div>
          <div class="embed-container">
            <iframe id="speaking-frame" src="speaking-practice.html"></iframe>
            <div class="embed-resize-handle"></div>
          </div>
        </section>

      </div>
    </div>
  </div>

  <script>
    // ── FIREBASE CONFIGURATION ──
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      databaseURL: "https://YOUR_PROJECT.firebaseio.com",
      storageBucket: "YOUR_PROJECT.appspot.com"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let currentUser = null;
    let currentUserName = "User";
    let sessionId = Date.now().toString();

    // ── NOTIFICATION SYSTEM ──
    function showNotification(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `notification-toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.style.animation = 'slideInUp 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // ── FIREBASE AUTH ──
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        currentUserName = user.displayName || user.email.split('@')[0];
        document.getElementById('user-badge').textContent = `👤 ${currentUserName}`;
        startCollaborativeTracking();
      } else {
        window.location.href = '/login'; // Redirect to login
      }
    });

    // ── COLLABORATIVE TRACKING ──
    function startCollaborativeTracking() {
      const classroomRef = database.ref(`classrooms/${window.location.pathname}`);

      // Listen for activities from other users
      classroomRef.child('activities').on('child_added', (snapshot) => {
        const activity = snapshot.val();
        if (activity.uid !== currentUser.uid) {
          const actionMap = {
            'sidebar_resize': `${activity.userName} resized the sidebar`,
            'whiteboard_draw': `${activity.userName} drew on the whiteboard`,
            'whiteboard_erase': `${activity.userName} erased on the whiteboard`,
            'whiteboard_clear': `${activity.userName} cleared the whiteboard`,
            'notes_edit': `${activity.userName} edited notes`,
            'word_canvas_interact': `${activity.userName} used the word canvas`,
            'find_sentences_interact': `${activity.userName} searched for sentences`,
            'speaking_practice': `${activity.userName} practiced speaking`
          };

          if (actionMap[activity.action]) {
            showNotification(actionMap[activity.action], 'info');
          }
        }
      });
    }

    // ── LOG ACTIVITY FUNCTION ──
    function logActivity(action, data = {}) {
      if (!currentUser) return;

      const classroomRef = database.ref(`classrooms/${window.location.pathname}`);
      const activityRef = classroomRef.child('activities').push();

      activityRef.set({
        uid: currentUser.uid,
        userName: currentUserName,
        action: action,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        data: data
      }).catch(err => console.error('Activity log error:', err));
    }

    // ── NOTES PERSISTENCE ──
    function saveNotes() {
      const notes = document.getElementById('notes-area').value;
      localStorage.setItem('classroom-notes', notes);

      if (currentUser) {
        logActivity('notes_edit', { contentLength: notes.length });
        const userRef = database.ref(`classrooms/${window.location.pathname}/notes/${currentUser.uid}`);
        userRef.set({
          content: notes,
          userName: currentUserName,
          timestamp: firebase.database.ServerValue.TIMESTAMP
        });
      }
    }

    function loadNotes() {
      const notes = localStorage.getItem('classroom-notes') || '';
      document.getElementById('notes-area').value = notes;
    }

    let notesSaveTimeout;
    document.getElementById('notes-area').addEventListener('input', () => {
      clearTimeout(notesSaveTimeout);
      notesSaveTimeout = setTimeout(saveNotes, 2000);
    });

    // ── SIDEBAR RESIZE (Simple & Smooth) ──
    const sidebar = document.querySelector('.sidebar');
    const sidebarResizeHandle = document.querySelector('.sidebar-resize-handle');
    let isResizingSidebar = false;

    function startSidebarResize(e) {
      isResizingSidebar = true;
      sidebarResizeHandle.classList.add('active');
      document.body.style.userSelect = 'none';
      document.body.style.touchAction = 'none';
      e.preventDefault();
    }

    function moveSidebarResize(e) {
      if (!isResizingSidebar) return;

      const containerRect = document.querySelector('.classroom-container').getBoundingClientRect();
      const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
      
      const newWidth = clientX - containerRect.left;
      const maxWidth = containerRect.width * 0.8;
      const constrainedWidth = Math.max(250, Math.min(maxWidth, newWidth));
      
      sidebar.style.width = constrainedWidth + 'px';
    }

    function endSidebarResize() {
      if (isResizingSidebar) {
        isResizingSidebar = false;
        sidebarResizeHandle.classList.remove('active');
        document.body.style.userSelect = 'auto';
        document.body.style.touchAction = 'auto';
        logActivity('sidebar_resize', { width: sidebar.offsetWidth });
      }
    }

    sidebarResizeHandle.addEventListener('mousedown', startSidebarResize);
    document.addEventListener('mousemove', moveSidebarResize, { passive: true });
    document.addEventListener('mouseup', endSidebarResize);

    sidebarResizeHandle.addEventListener('touchstart', startSidebarResize, { passive: false });
    document.addEventListener('touchmove', moveSidebarResize, { passive: true });
    document.addEventListener('touchend', endSidebarResize);
    document.addEventListener('touchcancel', endSidebarResize);

    // ── CARD CONTAINER RESIZE ──
    let isResizingCard = null;
    let resizeType = null;
    let resizeStartPos = 0;

    function startCardResize(e) {
      const verticalHandle = e.target.closest('.card-resize-handle');
      const horizontalRightHandle = e.target.closest('.card-resize-handle-right');
      const horizontalLeftHandle = e.target.closest('.card-resize-handle-left');

      if (verticalHandle) {
        isResizingCard = verticalHandle.closest('.section-card');
        resizeType = 'vertical';
        resizeStartPos = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        verticalHandle.classList.add('active');
      } else if (horizontalRightHandle) {
        isResizingCard = horizontalRightHandle.closest('.section-card');
        resizeType = 'horizontal-right';
        resizeStartPos = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        horizontalRightHandle.classList.add('active');
      } else if (horizontalLeftHandle) {
        isResizingCard = horizontalLeftHandle.closest('.section-card');
        resizeType = 'horizontal-left';
        resizeStartPos = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        horizontalLeftHandle.classList.add('active');
      }

      if (isResizingCard) {
        document.body.style.userSelect = 'none';
        document.body.style.touchAction = 'none';
        e.preventDefault();
      }
    }

    function moveCardResize(e) {
      if (!isResizingCard) return;

      if (resizeType === 'vertical') {
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        const rect = isResizingCard.getBoundingClientRect();
        const newHeight = clientY - rect.top;

        if (newHeight > 150) {
          isResizingCard.style.height = newHeight + 'px';
          const textarea = isResizingCard.querySelector('.notes-area');
          const embed = isResizingCard.querySelector('.embed-frame');
          if (textarea) textarea.style.height = (newHeight - 80) + 'px';
          if (embed) embed.style.height = (newHeight - 80) + 'px';
        }
      } else if (resizeType === 'horizontal-right') {
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const section = isResizingCard.closest('.two-column-section');
        const delta = clientX - resizeStartPos;
        
        const notesCard = section.querySelector('[data-card="notes"]');
        const wordCard = section.querySelector('[data-card="word-canvas"]');
        
        if (notesCard && wordCard) {
          const notesWidth = notesCard.offsetWidth + delta;
          const wordWidth = wordCard.offsetWidth - delta;
          
          if (notesWidth > 250 && wordWidth > 250) {
            notesCard.style.flex = `0 0 ${notesWidth}px`;
            wordCard.style.flex = `0 0 ${wordWidth}px`;
            resizeStartPos = clientX;
          }
        }
      } else if (resizeType === 'horizontal-left') {
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const section = isResizingCard.closest('.two-column-section');
        const delta = clientX - resizeStartPos;
        
        const notesCard = section.querySelector('[data-card="notes"]');
        const wordCard = section.querySelector('[data-card="word-canvas"]');
        
        if (notesCard && wordCard) {
          const wordWidth = wordCard.offsetWidth + delta;
          const notesWidth = notesCard.offsetWidth - delta;
          
          if (notesWidth > 250 && wordWidth > 250) {
            notesCard.style.flex = `0 0 ${notesWidth}px`;
            wordCard.style.flex = `0 0 ${wordWidth}px`;
            resizeStartPos = clientX;
          }
        }
      }
    }

    function endCardResize() {
      if (isResizingCard) {
        const verticalHandle = isResizingCard.querySelector('.card-resize-handle');
        const horizontalRightHandle = isResizingCard.querySelector('.card-resize-handle-right');
        const horizontalLeftHandle = isResizingCard.querySelector('.card-resize-handle-left');
        
        verticalHandle?.classList.remove('active');
        horizontalRightHandle?.classList.remove('active');
        horizontalLeftHandle?.classList.remove('active');
        
        logActivity(`${isResizingCard.dataset.card}_resize`, {
          height: isResizingCard.offsetHeight,
          width: isResizingCard.offsetWidth
        });

        isResizingCard = null;
        resizeType = null;
        document.body.style.userSelect = 'auto';
        document.body.style.touchAction = 'auto';
      }
    }

    document.addEventListener('mousedown', startCardResize);
    document.addEventListener('mousemove', moveCardResize, { passive: true });
    document.addEventListener('mouseup', endCardResize);
    
    document.addEventListener('touchstart', startCardResize, { passive: false });
    document.addEventListener('touchmove', moveCardResize, { passive: true });
    document.addEventListener('touchend', endCardResize);
    document.addEventListener('touchcancel', endCardResize);

    // ── WHITEBOARD CANVAS ──
    const canvas = document.getElementById('whiteboard');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      const frame = canvas.parentElement;
      const newWidth = frame.offsetWidth - 4;
      const newHeight = frame.offsetHeight - 4;
      
      if (canvas.width !== newWidth || canvas.height !== newHeight) {
        canvas.width = newWidth;
        canvas.height = newHeight;
      }
    }
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    const observer = new ResizeObserver(resizeCanvas);
    observer.observe(canvas.parentElement.parentElement);
    
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let isErasing = false;
    
    const drawBtn = document.querySelector('.draw-btn');
    const eraseBtn = document.querySelector('.erase-btn');
    const clearBtn = document.querySelector('.clear-btn');
    
    drawBtn.addEventListener('click', () => {
      isErasing = false;
      drawBtn.classList.add('active');
      eraseBtn.classList.remove('active');
      canvas.style.cursor = 'crosshair';
      logActivity('whiteboard_draw', { mode: 'activated' });
    });
    
    eraseBtn.addEventListener('click', () => {
      isErasing = true;
      eraseBtn.classList.add('active');
      drawBtn.classList.remove('active');
      canvas.style.cursor = 'grab';
      logActivity('whiteboard_erase', { mode: 'activated' });
    });
    
    clearBtn.addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      logActivity('whiteboard_clear');
    });
    
    canvas.addEventListener('mousedown', (e) => {
      isDrawing = true;
      const rect = canvas.getBoundingClientRect();
      lastX = e.clientX - rect.left;
      lastY = e.clientY - rect.top;
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (!isDrawing) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      if (isErasing) {
        ctx.clearRect(x - 15, y - 15, 30, 30);
      } else {
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
      }
      
      lastX = x;
      lastY = y;
    });
    
    canvas.addEventListener('mouseup', () => {
      isDrawing = false;
      if (lastX !== 0 && lastY !== 0) {
        logActivity('whiteboard_draw', { x: lastX, y: lastY });
      }
    });
    
    canvas.addEventListener('mouseleave', () => {
      isDrawing = false;
    });
    
    // Touch events
    canvas.addEventListener('touchstart', (e) => {
      isDrawing = true;
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      lastX = touch.clientX - rect.left;
      lastY = touch.clientY - rect.top;
      e.preventDefault();
    });
    
    canvas.addEventListener('touchmove', (e) => {
      if (!isDrawing) return;
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top;
      
      if (isErasing) {
        ctx.clearRect(x - 15, y - 15, 30, 30);
      } else {
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
      }
      
      lastX = x;
      lastY = y;
      e.preventDefault();
    });
    
    canvas.addEventListener('touchend', () => {
      isDrawing = false;
    });

    // ── EMBED IFRAME INTERACTIONS ──
    document.addEventListener('click', (e) => {
      if (e.target.closest('#word-canvas-frame')) {
        logActivity('word_canvas_interact');
      } else if (e.target.closest('#find-sentences-frame')) {
        logActivity('find_sentences_interact');
      } else if (e.target.closest('#speaking-frame')) {
        logActivity('speaking_practice');
      }
    });

    loadNotes();

    // ── EMBED CONTAINER RESIZE ──
    let isResizingEmbed = null;
    let embedStartY = 0;

    function startEmbedResize(e) {
      const handle = e.target.closest('.embed-resize-handle');
      if (handle) {
        isResizingEmbed = handle.closest('.embed-container');
        embedStartY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        handle.classList.add('active');
        document.body.style.userSelect = 'none';
        document.body.style.touchAction = 'none';
        e.preventDefault();
      }
    }

    function moveEmbedResize(e) {
      if (!isResizingEmbed) return;
      
      const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
      const rect = isResizingEmbed.getBoundingClientRect();
      const newHeight = clientY - rect.top;
      
      if (newHeight > 300) {
        isResizingEmbed.style.height = newHeight + 'px';
      }
    }

    function endEmbedResize() {
      if (isResizingEmbed) {
        const handle = isResizingEmbed.querySelector('.embed-resize-handle');
        handle?.classList.remove('active');
        logActivity('embed_container_resize', { height: isResizingEmbed.offsetHeight });
        isResizingEmbed = null;
        document.body.style.userSelect = 'auto';
        document.body.style.touchAction = 'auto';
      }
    }

    document.addEventListener('mousedown', startEmbedResize);
    document.addEventListener('mousemove', moveEmbedResize, { passive: true });
    document.addEventListener('mouseup', endEmbedResize);
    
    document.addEventListener('touchstart', startEmbedResize, { passive: false });
    document.addEventListener('touchmove', moveEmbedResize, { passive: true });
    document.addEventListener('touchend', endEmbedResize);
    document.addEventListener('touchcancel', endEmbedResize);
  </script>

</body>
</html>
