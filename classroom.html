<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom — Chinese60s</title>
  <meta name="description" content="Interactive classroom for learning Chinese with video, notes, vocabulary, speaking, and sentence search.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #222;
      --green: #7cb83e;
      --green-dark: #5a8f27;
      --green-light: #d8f0a0;
      --green-pale: #f2fde0;
      --yellow: #ffd84d;
      --yellow-pale: #fffbe6;
      --peach: #ffb89a;
      --peach-pale: #fff3ee;
      --sky: #72c8f0;
      --sky-pale: #eaf8ff;
      --lavender: #c5b0f8;
      --lavender-pale: #f3f0ff;
      --pink: #ffadc5;
      --pink-pale: #fff2f6;
      --white: #ffffff;
      --bg: #fffef5;
      --shadow-sm: 3px 3px 0 var(--black);
      --shadow-md: 4px 4px 0 var(--black);
      --shadow-lg: 6px 6px 0 var(--black);
      --border: 2.5px solid var(--black);
      --border-thick: 3px solid var(--black);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Fredoka', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--black);
      overflow: hidden;
      height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,0,0,0.045) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      background: var(--green);
      border-bottom: var(--border-thick);
      padding: 0 24px;
      height: 66px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    header h1 {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: 1.5rem;
      color: white;
      letter-spacing: 0.04em;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
    }

    /* ── MAIN LAYOUT ── */
    .classroom-container {
      display: flex;
      height: calc(100vh - 66px);
      gap: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 500px;
      height: 100%;
      background: var(--white);
      border-right: var(--border-thick);
      display: flex;
      flex-direction: column;
      z-index: 100;
      position: relative;
      flex-shrink: 0;
      will-change: width;
      overflow-y: auto;
      overflow-x: hidden;
      transition: width 0.1s ease;
    }

    .sidebar-resize-handle {
      position: absolute;
      width: 10px;
      height: 100%;
      right: -5px;
      top: 0;
      cursor: ew-resize;
      z-index: 150;
      background: transparent;
      will-change: background;
      pointer-events: auto;
      touch-action: none;
      transition: background 0.2s ease;
    }

    .sidebar-resize-handle:hover,
    .sidebar-resize-handle.active {
      background: var(--green);
      box-shadow: -4px 0 8px rgba(0, 0, 0, 0.15);
    }

    /* Sidebar scrollbar */
    .sidebar::-webkit-scrollbar {
      width: 8px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--green);
      border-radius: 4px;
    }

    .sidebar::-webkit-scrollbar-thumb:hover {
      background: var(--green-dark);
    }

    /* ── MAIN CONTENT ── */
    .main-content {
      flex: 1;
      min-width: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    .content-scroller {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 28px 32px;
      min-height: 0;
    }

    /* ── VIDEO SECTION ── */
    .video-section {
      margin-bottom: 32px;
    }

    .video-frame {
      width: 100%;
      aspect-ratio: 16/9;
      border: var(--border-thick);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      background: var(--black);
    }

    .video-frame iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: none;
    }

    .video-title {
      margin-top: 16px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--black);
    }

    .video-meta {
      margin-top: 8px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      color: #666;
    }

    /* ── TWO COLUMN LAYOUT ── */
    .two-column-section {
      display: grid;
      grid-template-columns: 0.6fr 1.4fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    .section-card {
      background: var(--white);
      border: var(--border-thick);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .section-card-title {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: var(--border);
    }

    .notes-area {
      flex: 1;
      resize: none;
      font-family: 'Fredoka', sans-serif;
      font-weight: 400;
      font-size: 0.95rem;
      padding: 12px;
      border: var(--border);
      border-radius: 12px;
      background: var(--yellow-pale);
      color: var(--black);
      line-height: 1.6;
    }

    .notes-area::placeholder {
      color: rgba(0,0,0,0.4);
    }

    .notes-area:focus {
      outline: none;
      box-shadow: inset 0 0 0 3px var(--yellow);
    }

    .embed-frame {
      width: 100%;
      flex: 1;
      min-height: 200px;
      border: var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .embed-frame iframe {
      width: 100%;
      flex: 1;
      min-height: 200px;
      border: none;
      display: block;
    }

    /* ── FULL WIDTH SECTIONS ── */
    .full-width-section {
      margin-bottom: 32px;
      min-height: 600px;
    }

    .section-heading {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 14px;
      padding: 12px 16px;
      background: var(--green-pale);
      border: var(--border);
      border-radius: 14px;
    }

    .embed-container {
      width: 100%;
      height: 100%;
      min-height: 550px;
      border: var(--border-thick);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      background: var(--white);
    }

    .embed-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── SCROLLBAR STYLING ── */
    .content-scroller::-webkit-scrollbar {
      width: 10px;
    }

    .content-scroller::-webkit-scrollbar-track {
      background: transparent;
    }

    .content-scroller::-webkit-scrollbar-thumb {
      background: var(--green);
      border-radius: 5px;
      border: 2px solid var(--bg);
    }

    .content-scroller::-webkit-scrollbar-thumb:hover {
      background: var(--green-dark);
    }

    /* ── CANVAS TOOLBAR ── */
    .canvas-toolbar {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .canvas-btn {
      padding: 8px 12px;
      background: #7cb83e;
      color: white;
      border: 2px solid #222;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .canvas-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .canvas-btn.active {
      background: #5a8f27;
      box-shadow: inset 0 0 0 2px #fff;
    }

    .canvas-btn.erase {
      background: #ff6b6b;
    }

    .canvas-btn.erase.active {
      background: #d63031;
    }

    /* ── ANIMATIONS ── */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .video-section,
    .two-column-section,
    .full-width-section {
      animation: slideIn 0.4s ease both;
    }

    .section-card {
      animation: slideIn 0.4s ease both;
    }

    .section-card:nth-child(2) {
      animation-delay: 0.1s;
    }

    .full-width-section:nth-of-type(2) {
      animation-delay: 0.2s;
    }

    .full-width-section:nth-of-type(3) {
      animation-delay: 0.3s;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) {
      .sidebar {
        width: 300px;
      }

      .content-scroller {
        padding: 20px 24px;
      }

      .two-column-section {
        gap: 16px;
      }

      .embed-container iframe {
        height: 500px;
      }
    }

    @media (max-width: 900px) {
      .classroom-container {
        flex-direction: column;
        height: auto;
        min-height: calc(100vh - 66px);
      }

      .sidebar {
        width: 100%;
        height: 200px;
        border-right: none;
        border-bottom: var(--border-thick);
        flex-shrink: 0;
      }

      .main-content {
        flex: 1;
        height: auto;
        min-height: calc(100vh - 66px - 200px);
      }

      .lesson-index {
        display: flex;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 8px 12px;
      }

      .lesson-item {
        margin: 6px 6px;
        flex-shrink: 0;
        min-width: 140px;
      }

      .two-column-section {
        grid-template-columns: 1fr;
      }

      .two-column-section .section-card {
        height: auto;
        min-height: 250px;
      }

      .embed-frame {
        min-height: 250px;
      }

      .content-scroller {
        padding: 16px 20px;
      }

      .embed-container {
        min-height: 350px;
      }

      .full-width-section {
        min-height: 400px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>CHINESE 60s</h1>
    <div style="flex: 1;"></div>
  </header>

  <div class="classroom-container">
    <!-- SIDEBAR - Learning Page Index Embed -->
    <aside class="sidebar">
      <div class="sidebar-content" style="height: 100%; border: none;">
        <iframe src="learning-page.html" style="width: 100%; height: 100%; border: none; display: block;"></iframe>
      </div>
      <div class="sidebar-resize-handle"></div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="content-scroller">

        <!-- VIDEO SECTION - YouTube Page Embed -->
        <section class="video-section" data-section="video" style="position: relative;">
          <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(124,184,62,0.1); border-radius: 8px 8px 0 0; margin: -20px -20px 12px -20px;">
            <span style="font-size: 0.85rem; color: #666;">Video</span>
          </div>
          <div class="video-frame" style="background: white; display: flex; align-items: center; justify-content: center; position: relative;">
            <canvas id="whiteboard" style="border: 2px solid #222; cursor: crosshair; display: block;"></canvas>
            <div class="canvas-toolbar">
              <button class="canvas-btn draw-btn active" title="Chế độ vẽ">✏️ Draw</button>
              <button class="canvas-btn erase-btn erase" title="Chế độ xóa">🧹 Erase</button>
              <button class="canvas-btn clear-btn" title="Xóa toàn bộ">🗑️ Clear</button>
            </div>
          </div>
        </section>

        <!-- TWO COLUMN SECTION: NOTES + WORD CANVAS -->
        <section class="two-column-section" data-section="two-column">
          <!-- NOTES AREA -->
          <div class="section-card" style="background: var(--yellow-pale); border: var(--border-thick); position: relative;" data-card="notes">
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,216,77,0.3); margin: -20px -20px 12px -20px; border-radius: 8px 8px 0 0;">
              <span style="font-size: 0.85rem; color: #666;">Notes</span>
            </div>
            <div class="section-card-title" style="border-bottom: var(--border-thick);">📝 My Notes</div>
            <textarea class="notes-area" id="notes-area" placeholder="Write your notes here...
          
Key points:
• 你好 (nǐ hǎo) = Hello
• 我叫... (wǒ jiào...) = My name is...

Add your own notes and they'll be saved!"></textarea>
            <div class="card-resize-handle"></div>
          </div>

          <!-- WORD CANVAS EMBED -->
          <div class="section-card" style="background: var(--sky-pale); border: var(--border-thick); position: relative;" data-card="word-canvas">
            <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(114,200,240,0.2); margin: -20px -20px 12px -20px; border-radius: 8px 8px 0 0;">
              <span style="font-size: 0.85rem; color: #0066cc;">Word Canvas</span>
            </div>
            <div class="section-card-title" style="border-bottom: var(--border-thick); color: #0066cc;">✏️ Word Canvas</div>
            <div class="embed-frame">
              <iframe id="word-canvas-frame" src="word-canvas.html"></iframe>
            </div>
            <div class="card-resize-handle"></div>
          </div>
        </section>

        <!-- FIND SENTENCES SECTION -->
        <section class="full-width-section" data-section="find-sentences" style="position: relative;">
          <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(124,184,62,0.1); border-radius: 8px 8px 0 0; margin: -12px -16px 12px -16px;">
            <span style="font-size: 0.85rem; color: #666;">Find Sentences</span>
          </div>
          <div class="embed-container">
            <iframe id="find-sentences-frame" src="find-sentences.html"></iframe>
          </div>
        </section>

        <!-- SPEAKING PRACTICE SECTION -->
        <section class="full-width-section" data-section="speaking" style="position: relative;">
          <div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(124,184,62,0.1); border-radius: 8px 8px 0 0; margin: -12px -16px 12px -16px;">
            <span style="font-size: 0.85rem; color: #666;">Speaking Practice</span>
          </div>
          <div class="embed-container">
            <iframe id="speaking-frame" src="speaking-practice.html"></iframe>
          </div>
        </section>

      </div>
    </div>
  </div>

  <script>
    // ── NOTES PERSISTENCE ──
    function saveNotes() {
      const notes = document.getElementById('notes-area').value;
      localStorage.setItem('classroom-notes', notes);
    }

    function loadNotes() {
      const notes = localStorage.getItem('classroom-notes') || '';
      document.getElementById('notes-area').value = notes;
    }

    let notesSaveTimeout;
    document.getElementById('notes-area').addEventListener('input', () => {
      clearTimeout(notesSaveTimeout);
      notesSaveTimeout = setTimeout(saveNotes, 2000);
    });

    // ── SIDEBAR RESIZE (Simple & Smooth) ──
    const sidebar = document.querySelector('.sidebar');
    const sidebarResizeHandle = document.querySelector('.sidebar-resize-handle');
    let isResizingSidebar = false;

    function startSidebarResize(e) {
      isResizingSidebar = true;
      sidebarResizeHandle.classList.add('active');
      document.body.style.userSelect = 'none';
      document.body.style.touchAction = 'none';
      e.preventDefault();
    }

    function moveSidebarResize(e) {
      if (!isResizingSidebar) return;

      const containerRect = document.querySelector('.classroom-container').getBoundingClientRect();
      const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
      
      // Tính vị trí relative đến container
      const newWidth = clientX - containerRect.left;
      
      // Min 250px, Max 80% width
      const maxWidth = containerRect.width * 0.8;
      const constrainedWidth = Math.max(250, Math.min(maxWidth, newWidth));
      
      sidebar.style.width = constrainedWidth + 'px';
    }

    function endSidebarResize() {
      if (isResizingSidebar) {
        isResizingSidebar = false;
        sidebarResizeHandle.classList.remove('active');
        document.body.style.userSelect = 'auto';
        document.body.style.touchAction = 'auto';
      }
    }

    // Mouse events
    sidebarResizeHandle.addEventListener('mousedown', startSidebarResize);
    document.addEventListener('mousemove', moveSidebarResize, { passive: true });
    document.addEventListener('mouseup', endSidebarResize);

    // Touch events
    sidebarResizeHandle.addEventListener('touchstart', startSidebarResize, { passive: false });
    document.addEventListener('touchmove', moveSidebarResize, { passive: true });
    document.addEventListener('touchend', endSidebarResize);
    document.addEventListener('touchcancel', endSidebarResize);

    // ── INDIVIDUAL CARD RESIZE (Real-time only + Touch Support) ──
    let resizingCard = null;
    let cardStartY = 0;
    let cardStartHeight = 0;

    function startCardResize(e) {
      const resizeHandle = e.target.closest('.card-resize-handle');
      if (resizeHandle) {
        resizingCard = resizeHandle.closest('.section-card');
        cardStartY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
        cardStartHeight = resizingCard.offsetHeight;
        document.body.style.cursor = 'nwse-resize';
        document.body.style.userSelect = 'none';
        document.body.style.touchAction = 'none';
        e.preventDefault();
      }
    }

    function moveCardResize(e) {
      if (resizingCard) {
        const currentY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
        const delta = currentY - cardStartY;
        const newHeight = Math.max(150, cardStartHeight + delta);
        resizingCard.style.height = newHeight + 'px';

        // Resize textarea or embed inside
        const textarea = resizingCard.querySelector('.notes-area');
        const embed = resizingCard.querySelector('.embed-frame');
        const header = resizingCard.querySelector('[style*="display: flex"]');
        const title = resizingCard.querySelector('.section-card-title');

        const headerHeight = (header?.offsetHeight || 0) + (title?.offsetHeight || 0) + 24;
        const contentHeight = newHeight - headerHeight;

        if (textarea) {
          textarea.style.height = Math.max(100, contentHeight) + 'px';
        }
        if (embed) {
          embed.style.height = Math.max(100, contentHeight) + 'px';
        }
      }
    }

    function endCardResize() {
      if (resizingCard) {
        resizingCard = null;
        document.body.style.cursor = 'auto';
        document.body.style.userSelect = 'auto';
        document.body.style.touchAction = 'auto';
      }
    }

    // Mouse events
    document.addEventListener('mousedown', startCardResize);
    document.addEventListener('mousemove', moveCardResize, { passive: true });
    document.addEventListener('mouseup', endCardResize);

    // Touch events
    document.addEventListener('touchstart', startCardResize);
    document.addEventListener('touchmove', moveCardResize, { passive: true });
    document.addEventListener('touchend', endCardResize);
    document.addEventListener('touchcancel', endCardResize);

    // ── WHITEBOARD CANVAS ──
    const canvas = document.getElementById('whiteboard');
    const ctx = canvas.getContext('2d');
    
    // Set canvas size to fill the frame
    function resizeCanvas() {
      const frame = canvas.parentElement;
      const newWidth = frame.offsetWidth - 4;
      const newHeight = frame.offsetHeight - 4;
      
      // Chỉ resize nếu có thay đổi
      if (canvas.width !== newWidth || canvas.height !== newHeight) {
        canvas.width = newWidth;
        canvas.height = newHeight;
      }
    }
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    // Trigger canvas resize khi sidebar/container resize (e.g. when resizing sidebar)
    const observer = new ResizeObserver(resizeCanvas);
    observer.observe(canvas.parentElement.parentElement);
    
    // Drawing variables
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let isErasing = false;
    
    // Canvas toolbar buttons
    const drawBtn = document.querySelector('.draw-btn');
    const eraseBtn = document.querySelector('.erase-btn');
    const clearBtn = document.querySelector('.clear-btn');
    
    drawBtn.addEventListener('click', () => {
      isErasing = false;
      drawBtn.classList.add('active');
      eraseBtn.classList.remove('active');
      canvas.style.cursor = 'crosshair';
    });
    
    eraseBtn.addEventListener('click', () => {
      isErasing = true;
      eraseBtn.classList.add('active');
      drawBtn.classList.remove('active');
      canvas.style.cursor = 'grab';
    });
    
    clearBtn.addEventListener('click', () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });
    
    // Mouse events
    canvas.addEventListener('mousedown', (e) => {
      isDrawing = true;
      const rect = canvas.getBoundingClientRect();
      lastX = e.clientX - rect.left;
      lastY = e.clientY - rect.top;
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (!isDrawing) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      if (isErasing) {
        // Eraser mode - xóa vùng tròn
        ctx.clearRect(x - 15, y - 15, 30, 30);
      } else {
        // Draw mode
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
      }
      
      lastX = x;
      lastY = y;
    });
    
    canvas.addEventListener('mouseup', () => {
      isDrawing = false;
    });
    
    canvas.addEventListener('mouseleave', () => {
      isDrawing = false;
    });
    
    // Touch events for iPad/mobile
    canvas.addEventListener('touchstart', (e) => {
      isDrawing = true;
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      lastX = touch.clientX - rect.left;
      lastY = touch.clientY - rect.top;
      e.preventDefault();
    });
    
    canvas.addEventListener('touchmove', (e) => {
      if (!isDrawing) return;
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      const x = touch.clientX - rect.left;
      const y = touch.clientY - rect.top;
      
      if (isErasing) {
        // Eraser mode - xóa vùng tròn
        ctx.clearRect(x - 15, y - 15, 30, 30);
      } else {
        // Draw mode
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.stroke();
      }
      
      lastX = x;
      lastY = y;
      e.preventDefault();
    });
    
    canvas.addEventListener('touchend', () => {
      isDrawing = false;
    });

    loadNotes();
  </script>

</body>
</html>
