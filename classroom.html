<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom — Chinese60s</title>
  <meta name="description" content="Interactive classroom for learning Chinese with video, notes, vocabulary, speaking, and sentence search.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #222;
      --green: #7cb83e;
      --green-dark: #5a8f27;
      --green-light: #d8f0a0;
      --green-pale: #f2fde0;
      --yellow: #ffd84d;
      --yellow-pale: #fffbe6;
      --peach: #ffb89a;
      --peach-pale: #fff3ee;
      --sky: #72c8f0;
      --sky-pale: #eaf8ff;
      --lavender: #c5b0f8;
      --lavender-pale: #f3f0ff;
      --pink: #ffadc5;
      --pink-pale: #fff2f6;
      --white: #ffffff;
      --bg: #fffef5;
      --shadow-sm: 3px 3px 0 var(--black);
      --shadow-md: 4px 4px 0 var(--black);
      --shadow-lg: 6px 6px 0 var(--black);
      --border: 2.5px solid var(--black);
      --border-thick: 3px solid var(--black);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Fredoka', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--black);
      overflow: hidden;
      height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,0,0,0.045) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      background: var(--green);
      border-bottom: var(--border-thick);
      padding: 0 24px;
      height: 66px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    header h1 {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      font-size: 1.5rem;
      color: white;
      letter-spacing: 0.04em;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
    }

    .header-breadcrumb {
      font-family: 'Fredoka', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.8);
    }

    /* ── MAIN LAYOUT ── */
    .classroom-container {
      display: flex;
      height: calc(100vh - 66px);
      gap: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 340px;
      height: 100%;
      background: var(--green-pale);
      border-right: var(--border-thick);
      display: flex;
      flex-direction: column;
      z-index: 100;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 18px;
      background: var(--green-light);
      border-bottom: var(--border-thick);
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .lesson-index {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0;
    }

    .lesson-item {
      padding: 12px 16px;
      margin: 6px 12px;
      border-radius: 14px;
      background: var(--white);
      border: var(--border);
      cursor: pointer;
      transition: all 0.12s;
      font-family: 'Fredoka', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      box-shadow: var(--shadow-sm);
    }

    .lesson-item:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 var(--black);
    }

    .lesson-item.active {
      background: var(--yellow);
      border: var(--border-thick);
      box-shadow: var(--shadow-md);
    }

    .lesson-item .lesson-number {
      display: inline-block;
      background: var(--green);
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      text-align: center;
      line-height: 28px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-right: 10px;
    }

    .lesson-item.active .lesson-number {
      background: var(--green-dark);
    }

    /* ── MAIN CONTENT ── */
    .main-content {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .content-scroller {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 28px 32px;
    }

    /* ── VIDEO SECTION ── */
    .video-section {
      margin-bottom: 32px;
    }

    .video-frame {
      width: 100%;
      aspect-ratio: 16/9;
      border: var(--border-thick);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      background: var(--black);
    }

    .video-frame iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: none;
    }

    .video-title {
      margin-top: 16px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--black);
    }

    .video-meta {
      margin-top: 8px;
      font-family: 'Fredoka', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      color: #666;
    }

    /* ── TWO COLUMN LAYOUT ── */
    .two-column-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    .section-card {
      background: var(--white);
      border: var(--border-thick);
      border-radius: 20px;
      padding: 20px;
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
    }

    .section-card-title {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: var(--border);
    }

    .notes-area {
      flex: 1;
      resize: none;
      font-family: 'Fredoka', sans-serif;
      font-weight: 400;
      font-size: 0.95rem;
      padding: 12px;
      border: var(--border);
      border-radius: 12px;
      background: var(--yellow-pale);
      color: var(--black);
      line-height: 1.6;
    }

    .notes-area::placeholder {
      color: rgba(0,0,0,0.4);
    }

    .notes-area:focus {
      outline: none;
      box-shadow: inset 0 0 0 3px var(--yellow);
    }

    .embed-frame {
      width: 100%;
      height: 400px;
      border: var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .embed-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── FULL WIDTH SECTIONS ── */
    .full-width-section {
      margin-bottom: 32px;
    }

    .section-heading {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 14px;
      padding: 12px 16px;
      background: var(--green-pale);
      border: var(--border);
      border-radius: 14px;
    }

    .embed-container {
      width: 100%;
      border: var(--border-thick);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      background: var(--white);
    }

    .embed-container iframe {
      width: 100%;
      height: 600px;
      border: none;
      display: block;
    }

    /* ── SCROLLBAR STYLING ── */
    .content-scroller::-webkit-scrollbar {
      width: 10px;
    }

    .content-scroller::-webkit-scrollbar-track {
      background: transparent;
    }

    .content-scroller::-webkit-scrollbar-thumb {
      background: var(--green);
      border-radius: 5px;
      border: 2px solid var(--bg);
    }

    .content-scroller::-webkit-scrollbar-thumb:hover {
      background: var(--green-dark);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) {
      .sidebar {
        width: 300px;
      }

      .content-scroller {
        padding: 20px 24px;
      }

      .two-column-section {
        gap: 16px;
      }

      .embed-container iframe {
        height: 500px;
      }
    }

    @media (max-width: 900px) {
      .classroom-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: var(--border-thick);
        max-height: 200px;
      }

      .lesson-index {
        display: flex;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 8px 12px;
      }

      .lesson-item {
        margin: 6px 6px;
        flex-shrink: 0;
        min-width: 140px;
      }

      .two-column-section {
        grid-template-columns: 1fr;
      }

      .content-scroller {
        padding: 16px 20px;
      }

      .embed-container iframe {
        height: 400px;
      }
    }

    /* ── ANIMATIONS ── */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .video-section,
    .two-column-section,
    .full-width-section {
      animation: slideIn 0.4s ease both;
    }

    .section-card {
      animation: slideIn 0.4s ease both;
    }

    .section-card:nth-child(2) {
      animation-delay: 0.1s;
    }

    .full-width-section:nth-of-type(2) {
      animation-delay: 0.2s;
    }

    .full-width-section:nth-of-type(3) {
      animation-delay: 0.3s;
    }
  </style>
</head>
<body>

  <header>
    <h1>CHINESE 60s</h1>
    <div class="header-breadcrumb">Classroom / <span id="current-lesson">Lesson 1</span></div>
  </header>

  <div class="classroom-container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">📚 Lessons</div>
      <div class="lesson-index" id="lesson-index">
        <!-- Populated by JavaScript -->
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="content-scroller">

        <!-- VIDEO SECTION -->
        <section class="video-section">
          <div class="video-frame">
            <iframe id="main-video" 
              src="https://www.youtube.com/embed/g70M56gdZC0?si=x5Yf3g8zt0doR9-k" 
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
              allowfullscreen>
            </iframe>
          </div>
          <h2 class="video-title" id="video-title">Lesson 1: Hello & Introduction</h2>
          <p class="video-meta" id="video-meta">Learn basic greetings and how to introduce yourself in Mandarin Chinese</p>
        </section>

        <!-- TWO COLUMN SECTION: NOTES + WORD CANVAS -->
        <section class="two-column-section">
          <!-- NOTES AREA -->
          <div class="section-card" style="background: var(--yellow-pale); border: var(--border-thick);">
            <div class="section-card-title" style="border-bottom: var(--border-thick);">📝 My Notes</div>
            <textarea class="notes-area" id="notes-area" placeholder="Write your notes here...
          
Key points:
• 你好 (nǐ hǎo) = Hello
• 我叫... (wǒ jiào...) = My name is...

Add your own notes and they'll be saved!"></textarea>
          </div>

          <!-- WORD CANVAS EMBED -->
          <div class="section-card" style="background: var(--sky-pale); border: var(--border-thick);">
            <div class="section-card-title" style="border-bottom: var(--border-thick); color: #0066cc;">✏️ Word Canvas</div>
            <div class="embed-frame">
              <iframe id="word-canvas-frame" src="word-canvas.html"></iframe>
            </div>
          </div>
        </section>

        <!-- SPEAKING PRACTICE SECTION -->
        <section class="full-width-section">
          <div class="section-heading">🎙️ Speaking Practice</div>
          <div class="embed-container">
            <iframe id="speaking-frame" src="speaking.html"></iframe>
          </div>
        </section>

        <!-- FIND SENTENCES SECTION -->
        <section class="full-width-section">
          <div class="section-heading">🔍 Find Sentences</div>
          <div class="embed-container">
            <iframe id="find-sentences-frame" src="find-sentences.html"></iframe>
          </div>
        </section>

      </div>
    </div>
  </div>

  <script>
    // Sample lessons data
    const lessons = [
      {
        id: 1,
        title: 'Hello & Introduction',
        videoId: 'g70M56gdZC0',
        description: 'Learn basic greetings and how to introduce yourself in Mandarin Chinese',
        meta: 'Foundation • 5 min'
      },
      {
        id: 2,
        title: 'Numbers 1-10',
        videoId: 't0Lirymcbcw',
        description: 'Master counting and number pronunciation',
        meta: 'Foundation • 6 min'
      },
      {
        id: 3,
        title: 'Asking Basic Questions',
        videoId: 'dQw4w9WgXcQ',
        description: 'Learn how to ask questions in everyday situations',
        meta: 'Foundation • 7 min'
      },
      {
        id: 4,
        title: 'Family & Relationships',
        videoId: 'jNQXAC9IVRw',
        description: 'Talk about family members and relationships',
        meta: 'Foundation • 8 min'
      },
      {
        id: 5,
        title: 'Food & Ordering',
        videoId: 'kffacxfA7g4',
        description: 'Essential vocabulary for ordering food',
        meta: 'Real-Life • 7 min'
      },
      {
        id: 6,
        title: 'Shopping & Prices',
        videoId: '9bZkp7q19f0',
        description: 'Learn how to shop and talk about prices',
        meta: 'Real-Life • 8 min'
      },
      {
        id: 7,
        title: 'Directions & Getting Around',
        videoId: 'aqz-KE-bpKQ',
        description: 'Navigate and ask for directions in Chinese',
        meta: 'Real-Life • 9 min'
      },
      {
        id: 8,
        title: 'Small Talk & Weather',
        videoId: 'X8tzR_-2Nnw',
        description: 'Common expressions and talking about weather',
        meta: 'Real-Life • 6 min'
      }
    ];

    let currentLessonId = 1;

    // Render lesson index
    function renderLessonIndex() {
      const index = document.getElementById('lesson-index');
      index.innerHTML = lessons.map(lesson => `
        <div class="lesson-item ${lesson.id === currentLessonId ? 'active' : ''}" data-lesson-id="${lesson.id}">
          <span class="lesson-number">${lesson.id}</span>
          <span>${lesson.title}</span>
        </div>
      `).join('');

      // Add click handlers
      document.querySelectorAll('.lesson-item').forEach(item => {
        item.addEventListener('click', () => {
          const lessonId = parseInt(item.dataset.lessonId);
          loadLesson(lessonId);
        });
      });
    }

    // Load lesson
    function loadLesson(lessonId) {
      const lesson = lessons.find(l => l.id === lessonId);
      if (!lesson) return;

      currentLessonId = lessonId;

      // Update header
      document.getElementById('current-lesson').textContent = `Lesson ${lesson.id}`;

      // Update video
      const videoFrame = document.getElementById('main-video');
      videoFrame.src = `https://www.youtube.com/embed/${lesson.videoId}?si=x5Yf3g8zt0doR9-k`;

      // Update video title and meta
      document.getElementById('video-title').textContent = `Lesson ${lesson.id}: ${lesson.title}`;
      document.getElementById('video-meta').textContent = lesson.description;

      // Update sidebar active state
      document.querySelectorAll('.lesson-item').forEach(item => {
        item.classList.toggle('active', parseInt(item.dataset.lessonId) === lessonId);
      });

      // Scroll to top
      document.querySelector('.content-scroller').scrollTop = 0;

      // Load notes from localStorage
      loadNotes();
    }

    // Notes persistence
    function saveNotes() {
      const notes = document.getElementById('notes-area').value;
      localStorage.setItem(`lesson-${currentLessonId}-notes`, notes);
    }

    function loadNotes() {
      const notes = localStorage.getItem(`lesson-${currentLessonId}-notes`) || '';
      document.getElementById('notes-area').value = notes;
    }

    // Auto-save notes every 2 seconds
    let notesSaveTimeout;
    document.getElementById('notes-area').addEventListener('input', () => {
      clearTimeout(notesSaveTimeout);
      notesSaveTimeout = setTimeout(saveNotes, 2000);
    });

    // Initialize
    renderLessonIndex();
    loadLesson(1);
  </script>

</body>
</html>
